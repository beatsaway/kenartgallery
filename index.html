<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ken Art Gallery</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(to bottom, #ffffff 0%, #e5e5e5 50%, #9ca3af 100%);
            color: #374151;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        h1 {
            font-size: clamp(1.75rem, 4vw, 2.25rem);
            font-weight: 600;
            letter-spacing: 0.02em;
            margin: 0 0 0.5rem;
            color: #111;
        }
        .tagline {
            font-size: 0.95rem;
            opacity: 0.85;
            margin-bottom: 2.5rem;
        }
        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }
        .nav a {
            display: block;
            padding: 1rem 1.75rem;
            background: none;
            border: none;
            border-radius: 8px;
            color: #111;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            transition: opacity 0.2s;
        }
        .nav a:hover {
            opacity: 0.7;
        }
        .nav a:focus {
            outline: 2px solid rgba(59, 130, 246, 0.6);
            outline-offset: 2px;
        }
        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            opacity: 0.7;
        }
        footer a { color: #2563eb; text-decoration: none; }
        footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Ken Art Gallery</h1>
    <p></p>
    <nav class="nav">
        <a href="./2016/index.html">2016</a>
        <a href="./2020/index.html">2020</a>
        <a href="./2025/index.html">2025</a>
    </nav>
    <footer>
        by <a href="https://www.instagram.com/imtortorken" target="_blank" rel="noopener">imtortorken</a>
        · <a href="https://buymeacoffee.com/beatsaway" target="_blank" rel="noopener">Support this artist</a>
    </footer>
</body>
</html>
